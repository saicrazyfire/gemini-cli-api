app_name: "Gemini CLI API Wrapper"
debug: false
rate_limit:
    enabled: true
    requests: 10
    period_seconds: 60
cli:
    default_timeout_seconds: 30
    max_timeout_seconds: 120
models:
    default: "gemini-3-flash-preview"
    allowed:
        - "gemini-3.1-pro-preview"
        - "gemini-3-flash-preview"
        - "gemini-2.5-pro"
        - "gemini-2.5-flash"
        - "gemini-2.5-flash-lite"
